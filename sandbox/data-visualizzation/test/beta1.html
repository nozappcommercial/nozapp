<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sfera Semantica — Editorial Graph</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@300;400&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #c9a84c;
            --gold-dim: #8a6f33;
            --ember: #e8613a;
            --cold: #4a9eca;
            --bg: #07090f;
            --surface: rgba(12, 16, 24, 0.85);
            --text: #d4c9b8;
            --text-dim: #6b6358;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
        }

        /* ── Vignette ── */
        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(7, 9, 15, 0.75) 100%);
        }

        /* ── UI Shell ── */
        .ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            padding: 28px 36px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--text);
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .title em {
            font-style: italic;
            color: var(--gold);
        }

        .instructions {
            font-family: 'Inconsolata', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-align: right;
            line-height: 1.8;
            max-width: 220px;
        }

        /* ── Legend ── */
        .legend {
            position: fixed;
            bottom: 36px;
            left: 36px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inconsolata', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-line {
            width: 24px;
            height: 1px;
            flex-shrink: 0;
        }

        /* ── Info Panel ── */
        #info-panel {
            position: fixed;
            bottom: 36px;
            right: 36px;
            width: 280px;
            background: var(--surface);
            border: 1px solid rgba(201, 168, 76, 0.2);
            padding: 20px 22px;
            backdrop-filter: blur(12px);
            pointer-events: auto;
            z-index: 10;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #info-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .panel-label {
            font-family: 'Inconsolata', monospace;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 8px;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .panel-year {
            font-family: 'Inconsolata', monospace;
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .panel-connections {
            font-family: 'Inconsolata', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            line-height: 1.7;
        }

        .conn-tag {
            display: inline-block;
            background: rgba(201, 168, 76, 0.08);
            border: 1px solid rgba(201, 168, 76, 0.18);
            color: var(--gold);
            font-size: 9px;
            padding: 2px 7px;
            margin: 2px 2px 2px 0;
            letter-spacing: 0.12em;
        }

        .panel-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1;
            pointer-events: auto;
            transition: color 0.2s;
        }

        .panel-close:hover {
            color: var(--gold);
        }

        /* ── Pillar badge ── */
        .pillar-badge {
            display: inline-block;
            background: rgba(232, 97, 58, 0.15);
            border: 1px solid rgba(232, 97, 58, 0.4);
            color: var(--ember);
            font-family: 'Inconsolata', monospace;
            font-size: 8px;
            letter-spacing: 0.2em;
            padding: 2px 7px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* ── Path counter ── */
        #path-info {
            position: fixed;
            top: 50%;
            left: 36px;
            transform: translateY(-50%);
            z-index: 10;
            pointer-events: none;
            font-family: 'Inconsolata', monospace;
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            opacity: 0;
            transition: opacity 0.4s;
        }

        #path-info.visible {
            opacity: 1;
        }

        /* ── Scanlines texture overlay ── */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.015) 2px,
                    rgba(0, 0, 0, 0.015) 4px);
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div class="ui">
        <header>
            <div>
                <div class="brand">Editorial Graph</div>
                <div class="title">La <em>Sfera</em> Semantica</div>
            </div>
            <div class="instructions">
                TRASCINA · ruota la sfera<br>
                HOVER · esplora i nodi<br>
                CLICK · attiva il percorso<br>
                SCROLL · zoom
            </div>
        </header>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#e8613a;box-shadow:0 0 6px #e8613a;"></div>
            Pilastri del gusto
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#c9a84c;box-shadow:0 0 6px #c9a84c88;"></div>
            Film consigliati
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#4a9eca;box-shadow:0 0 4px #4a9eca66;"></div>
            Nodi secondari
        </div>
        <div class="legend-item" style="margin-top:4px;">
            <div class="legend-line" style="background:linear-gradient(90deg,#e8613a,#c9a84c);"></div>
            Affinità tematica
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background:linear-gradient(90deg,#c9a84c,#4a9eca);"></div>
            Evoluzione stilistica
        </div>
        <div class="legend-item">
            <div class="legend-line" style="background:rgba(74,158,202,0.4);"></div>
            Contrasto narrativo
        </div>
    </div>

    <div id="path-info">PERCORSO ATTIVO</div>

    <div id="info-panel">
        <button class="panel-close" id="close-btn">×</button>
        <div class="panel-label">Nodo selezionato</div>
        <div id="panel-pillar"></div>
        <div class="panel-title" id="panel-title">—</div>
        <div class="panel-year" id="panel-year"></div>
        <div class="panel-connections" id="panel-connections"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ─────────────────────────────────────────
        // DATA
        // ─────────────────────────────────────────
        const FILMS = [
            // PILLAR nodes (user taste anchors) - ember
            { id: 0, title: "Solaris", year: 1972, dir: "Tarkovsky", type: "pillar", tags: ["contemplazione", "spazio-tempo", "identità"] },
            { id: 1, title: "Mulholland Drive", year: 2001, dir: "Lynch", type: "pillar", tags: ["sogno", "doppio", "noir psichico"] },
            { id: 2, title: "Stalker", year: 1979, dir: "Tarkovsky", type: "pillar", tags: ["zona proibita", "fede", "vuoto"] },

            // PRIMARY recommended nodes - gold
            { id: 3, title: "Annihilation", year: 2018, dir: "Garland", type: "primary", tags: ["confine realtà", "corpo", "area X"] },
            { id: 4, title: "Lost Highway", year: 1997, dir: "Lynch", type: "primary", tags: ["identità fluida", "colpa", "mistero"] },
            { id: 5, title: "2001: Odissea", year: 1968, dir: "Kubrick", type: "primary", tags: ["evoluzione", "silenzio", "monolito"] },
            { id: 6, title: "Inland Empire", year: 2006, dir: "Lynch", type: "primary", tags: ["meta-narrazione", "dissociazione"] },
            { id: 7, title: "The Mirror", year: 1975, dir: "Tarkovsky", type: "primary", tags: ["memoria", "sogno", "madre"] },

            // SECONDARY nodes - cold blue
            { id: 8, title: "Blade Runner 2049", year: 2017, dir: "Villeneuve", type: "secondary", tags: ["post-umano", "solitudine", "identità"] },
            { id: 9, title: "Persona", year: 1966, dir: "Bergman", type: "secondary", tags: ["doppio", "silenzio", "maschera"] },
            { id: 10, title: "Holy Motors", year: 2012, dir: "Carax", type: "secondary", tags: ["metamorfosi", "recitazione", "vita"] },
            { id: 11, title: "Under the Skin", year: 2013, dir: "Glazer", type: "secondary", tags: ["alieno", "corpo", "predazione"] },
            { id: 12, title: "Eraserhead", year: 1977, dir: "Lynch", type: "secondary", tags: ["angoscia", "industriale", "paternità"] },
            { id: 13, title: "The Lighthouse", year: 2019, dir: "Eggers", type: "secondary", tags: ["follia", "isolamento", "mitico"] },
            { id: 14, title: "Picnic at Hanging Rock", year: 1975, dir: "Weir", type: "secondary", tags: ["mistero", "natura", "scomparsa"] },
            { id: 15, title: "Enter the Void", year: 2009, dir: "Noé", type: "secondary", tags: ["morte", "bardo", "coscienza"] },
            { id: 16, title: "Sátántangó", year: 1994, dir: "Tarr", type: "secondary", tags: ["tempo", "desolazione", "attesa"] },
            { id: 17, title: "Memoria", year: 2021, dir: "Weerasethakul", type: "secondary", tags: ["suono", "amnesia", "Colombia"] },
            { id: 18, title: "A Ghost Story", year: 2017, dir: "Lowery", type: "secondary", tags: ["tempo", "lutto", "casa"] },
            { id: 19, title: "Seconds", year: 1966, dir: "Frankenheimer", type: "secondary", tags: ["identità nuova", "orrore borghese"] },
        ];

        const EDGES = [
            // type: "thematic" | "stylistic" | "contrast"
            { from: 0, to: 3, type: "thematic", label: "Affinità tematica — confine realtà" },
            { from: 0, to: 5, type: "thematic", label: "Affinità tematica — silenzio cosmico" },
            { from: 0, to: 2, type: "stylistic", label: "Evoluzione stilistica — Tarkovsky" },
            { from: 0, to: 7, type: "stylistic", label: "Evoluzione stilistica — tempo liquido" },
            { from: 0, to: 17, type: "contrast", label: "Contrasto narrativo — suono vs visione" },
            { from: 1, to: 4, type: "stylistic", label: "Evoluzione stilistica — Lynch-verse" },
            { from: 1, to: 6, type: "stylistic", label: "Evoluzione stilistica — meta-Lynch" },
            { from: 1, to: 12, type: "thematic", label: "Affinità tematica — inconscio industriale" },
            { from: 1, to: 9, type: "thematic", label: "Affinità tematica — il doppio" },
            { from: 1, to: 19, type: "thematic", label: "Affinità tematica — identità sostituita" },
            { from: 2, to: 16, type: "thematic", label: "Affinità tematica — attesa e desolazione" },
            { from: 2, to: 13, type: "contrast", label: "Contrasto narrativo — isolamento" },
            { from: 2, to: 14, type: "contrast", label: "Contrasto narrativo — zona proibita" },
            { from: 3, to: 11, type: "thematic", label: "Affinità tematica — corpo alieno" },
            { from: 3, to: 8, type: "stylistic", label: "Evoluzione stilistica — sci-fi contemplativo" },
            { from: 4, to: 12, type: "stylistic", label: "Evoluzione stilistica — early Lynch" },
            { from: 5, to: 8, type: "stylistic", label: "Evoluzione stilistica — odissea visiva" },
            { from: 5, to: 15, type: "thematic", label: "Affinità tematica — coscienza oltre la morte" },
            { from: 6, to: 10, type: "thematic", label: "Affinità tematica — identità performativa" },
            { from: 7, to: 18, type: "thematic", label: "Affinità tematica — lutto e tempo" },
            { from: 9, to: 10, type: "contrast", label: "Contrasto narrativo — maschera vs metamorfosi" },
            { from: 11, to: 15, type: "thematic", label: "Affinità tematica — corpo-coscienza" },
            { from: 13, to: 16, type: "contrast", label: "Contrasto narrativo — ritmo del tempo" },
        ];

        // ─────────────────────────────────────────
        // THREE.JS SETUP
        // ─────────────────────────────────────────
        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x07090f, 1);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 9);

        // Fog for depth
        scene.fog = new THREE.FogExp2(0x07090f, 0.045);

        // ─────────────────────────────────────────
        // SPHERE WIREFRAME (ambient)
        // ─────────────────────────────────────────
        const sphereGeo = new THREE.SphereGeometry(3.8, 24, 16);
        const sphereMat = new THREE.MeshBasicMaterial({
            color: 0x1a2235,
            wireframe: true,
            transparent: true,
            opacity: 0.12
        });
        const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphereMesh);

        // Inner glow sphere
        const innerGeo = new THREE.SphereGeometry(3.75, 32, 32);
        const innerMat = new THREE.MeshBasicMaterial({
            color: 0x0d1525,
            transparent: true,
            opacity: 0.5,
            side: THREE.BackSide
        });
        scene.add(new THREE.Mesh(innerGeo, innerMat));

        // ─────────────────────────────────────────
        // POSITION NODES ON SPHERE
        // ─────────────────────────────────────────
        const SPHERE_R = 3.6;

        // Fibonacci sphere distribution
        function fibonacciSphere(n, total) {
            const phi = Math.PI * (3 - Math.sqrt(5));
            const y = 1 - (n / (total - 1)) * 2;
            const r = Math.sqrt(1 - y * y);
            const theta = phi * n;
            return new THREE.Vector3(
                Math.cos(theta) * r * SPHERE_R,
                y * SPHERE_R,
                Math.sin(theta) * r * SPHERE_R
            );
        }

        const positions = FILMS.map((_, i) => fibonacciSphere(i, FILMS.length));

        // ─────────────────────────────────────────
        // NODE COLORS
        // ─────────────────────────────────────────
        const COLOR = {
            pillar: { core: 0xe8613a, glow: 0xe8613a, size: 0.13 },
            primary: { core: 0xc9a84c, glow: 0xc9a84c, size: 0.10 },
            secondary: { core: 0x4a9eca, glow: 0x4a9eca, size: 0.07 },
        };

        // ─────────────────────────────────────────
        // CREATE NODES
        // ─────────────────────────────────────────
        const nodeMeshes = [];
        const glowMeshes = [];
        const group = new THREE.Group();
        scene.add(group);

        FILMS.forEach((film, i) => {
            const cfg = COLOR[film.type];
            const pos = positions[i];

            // Core sphere
            const geo = new THREE.SphereGeometry(cfg.size, 16, 12);
            const mat = new THREE.MeshBasicMaterial({ color: cfg.core });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(pos);
            mesh.userData = { filmId: i, originalColor: cfg.core };
            group.add(mesh);
            nodeMeshes.push(mesh);

            // Glow halo
            const glowGeo = new THREE.SphereGeometry(cfg.size * 2.8, 16, 12);
            const glowMat = new THREE.MeshBasicMaterial({
                color: cfg.glow,
                transparent: true,
                opacity: film.type === 'pillar' ? 0.12 : 0.06
            });
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            glowMesh.position.copy(pos);
            group.add(glowMesh);
            glowMeshes.push(glowMesh);
        });

        // ─────────────────────────────────────────
        // CREATE EDGES
        // ─────────────────────────────────────────
        const EDGE_COLOR = {
            thematic: { from: 0xe8613a, to: 0xc9a84c, opacity: 0.55 },
            stylistic: { from: 0xc9a84c, to: 0x4a9eca, opacity: 0.45 },
            contrast: { from: 0x4a9eca, to: 0x2a4f65, opacity: 0.30 },
        };

        const edgeLines = [];

        function createCurvedEdge(posA, posB, edgeCfg, numPoints = 40) {
            const mid = posA.clone().add(posB).multiplyScalar(0.5);
            // Bend outward from center
            const outDir = mid.clone().normalize();
            const bendAmount = posA.distanceTo(posB) * 0.3;
            mid.add(outDir.multiplyScalar(bendAmount));

            const curve = new THREE.QuadraticBezierCurve3(posA, mid, posB);
            const points = curve.getPoints(numPoints);

            // Build gradient geometry
            const positions = [];
            const colors = [];
            const cFrom = new THREE.Color(edgeCfg.from);
            const cTo = new THREE.Color(edgeCfg.to);
            const tmp = new THREE.Color();

            for (let i = 0; i < points.length; i++) {
                const t = i / (points.length - 1);
                positions.push(points[i].x, points[i].y, points[i].z);
                tmp.lerpColors(cFrom, cTo, t);
                colors.push(tmp.r, tmp.g, tmp.b);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: edgeCfg.opacity,
                blending: THREE.AdditiveBlending,
            });

            const line = new THREE.Line(geo, mat);
            return line;
        }

        EDGES.forEach((edge, i) => {
            const cfg = EDGE_COLOR[edge.type];
            const line = createCurvedEdge(positions[edge.from], positions[edge.to], cfg);
            line.userData = { edgeIdx: i, baseOpacity: cfg.opacity };
            group.add(line);
            edgeLines.push(line);
        });

        // ─────────────────────────────────────────
        // PARTICLES (ambient stars inside sphere)
        // ─────────────────────────────────────────
        const starCount = 320;
        const starPositions = [];
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 0.5 + Math.random() * 3.3;
            starPositions.push(
                Math.sin(phi) * Math.cos(theta) * r,
                Math.sin(phi) * Math.sin(theta) * r,
                Math.cos(phi) * r
            );
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({
            color: 0x8890aa,
            size: 0.018,
            transparent: true,
            opacity: 0.35,
            sizeAttenuation: true
        });
        group.add(new THREE.Points(starGeo, starMat));

        // ─────────────────────────────────────────
        // RAYCASTING
        // ─────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.1;
        const mouse = new THREE.Vector2();
        let hoveredId = null;
        let selectedId = null;
        let activeEdgeIds = [];

        function getConnectedEdgeIds(filmId) {
            return EDGES.reduce((acc, e, i) => {
                if (e.from === filmId || e.to === filmId) acc.push(i);
                return acc;
            }, []);
        }

        function getConnectedNodeIds(filmId) {
            const ids = new Set([filmId]);
            EDGES.forEach(e => {
                if (e.from === filmId) ids.add(e.to);
                if (e.to === filmId) ids.add(e.from);
            });
            return ids;
        }

        function highlightNode(id, intensity = 1) {
            const mesh = nodeMeshes[id];
            const glow = glowMeshes[id];
            const film = FILMS[id];
            const cfg = COLOR[film.type];
            const col = new THREE.Color(cfg.glow);
            col.multiplyScalar(intensity > 1 ? 1.8 : 1);
            mesh.material.color.set(col);
            glow.material.opacity = (film.type === 'pillar' ? 0.22 : 0.14) * intensity;
        }

        function resetAllNodes() {
            FILMS.forEach((film, i) => {
                nodeMeshes[i].material.color.setHex(COLOR[film.type].core);
                glowMeshes[i].material.opacity = film.type === 'pillar' ? 0.12 : 0.06;
            });
            edgeLines.forEach((l, i) => {
                l.material.opacity = EDGE_COLOR[EDGES[i].type].opacity;
            });
        }

        function selectNode(id) {
            selectedId = id;
            activeEdgeIds = getConnectedEdgeIds(id);
            const connectedNodes = getConnectedNodeIds(id);

            // Dim unrelated
            FILMS.forEach((_, i) => {
                if (!connectedNodes.has(i)) {
                    nodeMeshes[i].material.color.setHex(0x1e2535);
                    glowMeshes[i].material.opacity = 0.01;
                } else {
                    highlightNode(i, i === id ? 2.5 : 1.4);
                }
            });

            edgeLines.forEach((l, i) => {
                l.material.opacity = activeEdgeIds.includes(i)
                    ? EDGE_COLOR[EDGES[i].type].opacity * 2.2
                    : 0.03;
            });

            // Show panel
            showPanel(id);
            document.getElementById('path-info').classList.add('visible');
        }

        function showPanel(id) {
            const film = FILMS[id];
            const panel = document.getElementById('info-panel');
            document.getElementById('panel-title').textContent = film.title;
            document.getElementById('panel-year').textContent = `${film.year} · ${film.dir}`;

            const pillarEl = document.getElementById('panel-pillar');
            pillarEl.innerHTML = film.type === 'pillar'
                ? '<div class="pillar-badge">★ Pilastro del gusto</div>'
                : '';

            const connEdges = EDGES.filter(e => e.from === id || e.to === id);
            const connFilms = connEdges.map(e => {
                const otherId = e.from === id ? e.to : e.from;
                return `<span class="conn-tag">${FILMS[otherId].title}</span>`;
            });

            const tagHtml = film.tags.map(t => `<span class="conn-tag">${t}</span>`).join('');

            document.getElementById('panel-connections').innerHTML =
                `<div style="margin-bottom:8px;color:#8a8070;font-size:9px;letter-spacing:.15em;">TEMI</div>${tagHtml}` +
                (connFilms.length ? `<div style="margin:10px 0 6px;color:#8a8070;font-size:9px;letter-spacing:.15em;">CONNESSIONI</div>${connFilms.join('')}` : '');

            panel.classList.add('visible');
        }

        // ─────────────────────────────────────────
        // MOUSE INTERACTION
        // ─────────────────────────────────────────
        let isDown = false;
        let lastMouse = { x: 0, y: 0 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;

        canvas.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDown) {
                const dx = e.clientX - lastMouse.x;
                const dy = e.clientY - lastMouse.y;
                velocity.x = dy * 0.005;
                velocity.y = dx * 0.005;
                group.rotation.x += velocity.x;
                group.rotation.y += velocity.y;
                isDragging = true;
            }
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        canvas.addEventListener('mousedown', e => {
            isDown = true; isDragging = false;
            lastMouse = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0 };
        });

        canvas.addEventListener('mouseup', e => {
            isDown = false;
            if (!isDragging) {
                // Check click on node
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(nodeMeshes);
                if (hits.length) {
                    const id = hits[0].object.userData.filmId;
                    if (selectedId === id) {
                        // deselect
                        selectedId = null;
                        activeEdgeIds = [];
                        resetAllNodes();
                        document.getElementById('info-panel').classList.remove('visible');
                        document.getElementById('path-info').classList.remove('visible');
                    } else {
                        selectNode(id);
                    }
                } else {
                    selectedId = null;
                    activeEdgeIds = [];
                    resetAllNodes();
                    document.getElementById('info-panel').classList.remove('visible');
                    document.getElementById('path-info').classList.remove('visible');
                }
            }
        });

        canvas.addEventListener('wheel', e => {
            camera.position.z = Math.max(5, Math.min(16, camera.position.z + e.deltaY * 0.01));
            e.preventDefault();
        }, { passive: false });

        document.getElementById('close-btn').addEventListener('click', () => {
            selectedId = null;
            activeEdgeIds = [];
            resetAllNodes();
            document.getElementById('info-panel').classList.remove('visible');
            document.getElementById('path-info').classList.remove('visible');
        });

        // ─────────────────────────────────────────
        // ANIMATION LOOP
        // ─────────────────────────────────────────
        let t = 0;

        function animate() {
            requestAnimationFrame(animate);
            t += 0.008;

            // Auto-rotate when not dragging/selected
            if (!isDown && selectedId === null) {
                group.rotation.y += 0.0018;
                group.rotation.x += 0.0004;
            }

            // Inertia
            if (!isDown) {
                velocity.x *= 0.94;
                velocity.y *= 0.94;
                if (selectedId === null) {
                    group.rotation.x += velocity.x;
                    group.rotation.y += velocity.y;
                }
            }

            // Pulse pillar nodes
            FILMS.forEach((film, i) => {
                if (film.type === 'pillar') {
                    const pulse = 1 + Math.sin(t * 1.8 + i) * 0.25;
                    const baseOpacity = selectedId === null ? 0.18 : (selectedId === i ? 0.35 : null);
                    if (baseOpacity !== null) glowMeshes[i].material.opacity = baseOpacity * pulse;
                }
            });

            // Hover detection (only when nothing selected)
            if (selectedId === null) {
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(nodeMeshes);
                const newHovered = hits.length ? hits[0].object.userData.filmId : null;

                if (newHovered !== hoveredId) {
                    if (hoveredId !== null) resetAllNodes();
                    hoveredId = newHovered;
                    if (hoveredId !== null) {
                        const connNodes = getConnectedNodeIds(hoveredId);
                        connNodes.forEach(nid => highlightNode(nid, nid === hoveredId ? 2 : 1.3));
                        const connEdges = getConnectedEdgeIds(hoveredId);
                        edgeLines.forEach((l, i) => {
                            l.material.opacity = connEdges.includes(i)
                                ? EDGE_COLOR[EDGES[i].type].opacity * 1.9
                                : EDGE_COLOR[EDGES[i].type].opacity * 0.3;
                        });
                        canvas.style.cursor = 'pointer';
                    } else {
                        canvas.style.cursor = 'grab';
                    }
                }
            }

            // Animate active edge opacity (shimmer)
            if (activeEdgeIds.length) {
                activeEdgeIds.forEach(i => {
                    const base = EDGE_COLOR[EDGES[i].type].opacity;
                    edgeLines[i].material.opacity = base * (2.0 + Math.sin(t * 3 + i) * 0.4);
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        // ─────────────────────────────────────────
        // RESIZE
        // ─────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
